#generic yahoo finance configuration

data:
  source_type: "yfinance"

  tickers: ["AAPL", "TSLA", "BBVA.MC", "NVDA"]          #change this to AAPL, TSLA, BBVA.MC, etc. (feel free to use more than one ticker)
  start_date: "2018-01-01"
  end_date: null

  date_column: "Date"
  price_column: "Close"

  frequency: "B"
  timezone: null

  base_currency: "USD"

  fx:
    enabled: true

    #this part is optional, but allows the user to decide what to do if the currency can't be detected or the FX pair is missing
    on_missing : "error"   #write either "error" or "skip"


cleaning:
  drop_duplicates: true
  sort_by_date: true
  na_strategy: "ffill_then_bfill"
  return_type: "log"
  align_method: "inner"
  min_rows: 30


kpis:
  annualization_factor: 252
  risk_free_rate: 0.0
  rolling_windows: [21, 63, 126, 252]


visuals:
  dpi: 150
  figure_format: "png"


report:
  title: "Yahoo Finance Report"
  output_pdf: "./reports/report.pdf"
  output_html: "./reports/report.html"

  include_kpis: true
  include_drawdowns: true
  include_rolling: true
  include_histograms: true
  include_boxplots: true

  executive_summary_template: "standard"